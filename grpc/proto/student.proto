syntax = "proto3";

package student;

option go_package = "github.com/piggywave/forever_rpc/grpc/go/student";

enum Sex {
    MALE = 0;
    FEMALE = 1;
    OTHER = 2;
}

message Student {
    string name = 1;
    int32 age = 2;
    string address = 3;
    string phone = 4;
    repeated string subjects = 5;
    Sex sex = 6;
}
